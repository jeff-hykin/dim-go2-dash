<!doctype html>
<!--
  Go2 Dash — discover nearby Unitree Go2 robots (BLE + LAN) and provision them
  onto a wifi network over Bluetooth. The heavy lifting lives in the backend
  (main.js → go2_helper.py, reusing dimos' go2tool). This is the panel: a small
  floating list of nearby dogs on the left. Each dog shows its name (rename it —
  saved to the backend, keyed to its Bluetooth id) with a colour derived from
  that id, plus its IP when it's on the network. A ⋯ menu opens "Connect to
  Wi-Fi". The panel slides away once a dog is connected, leaving the stage for
  the per-dog dashboard to come.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Go2 Dash · DimOS</title>
<link rel="stylesheet" href="/assets/theme.css" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body { color: var(--fg); background: var(--bg); font-family: var(--sans, system-ui, sans-serif); }

  /* ── main stage: reserved for the per-dog dashboard (battery, camera, …) ── */
  .stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 40px; }
  .stage .empty { text-align: center; max-width: 360px; color: var(--muted-fg); }
  .stage .empty .glyph { font-size: 44px; opacity: .5; margin-bottom: 14px; }
  .stage .empty h1 { font-size: 16px; font-weight: 600; color: var(--fg); margin: 0 0 8px; letter-spacing: .02em; }
  .stage .empty p { font-size: 13px; line-height: 1.5; margin: 0; }
  .stage.connected .glyph { opacity: 1; }

  /* ── floating panel (left) ── */
  .panel { position: fixed; left: 16px; top: 16px; bottom: 16px; width: 312px;
    display: flex; flex-direction: column; background: var(--card);
    border: 1px solid var(--border); border-radius: calc(var(--radius) * 1.6);
    box-shadow: 0 18px 50px -20px rgba(0,0,0,.55), 0 2px 8px -4px rgba(0,0,0,.3);
    overflow: hidden; transition: transform .32s cubic-bezier(.4,0,.2,1), opacity .32s; }
  .panel.slid { transform: translateX(calc(-100% - 32px)); opacity: 0; pointer-events: none; }

  .p-head { display: flex; align-items: center; gap: 10px; padding: 13px 15px;
    border-bottom: 1px solid var(--border); flex: none; }
  .p-head .t { font-size: 12px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; }
  .p-head .spacer { flex: 1; }
  .icon-btn { appearance: none; cursor: pointer; font: inherit; color: var(--muted-fg);
    background: transparent; border: 1px solid var(--border); border-radius: var(--radius);
    width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center;
    transition: color .14s, border-color .14s; }
  .icon-btn:hover { color: var(--fg); border-color: var(--ring); }

  .p-scan { display: flex; align-items: center; gap: 10px; padding: 11px 15px;
    border-bottom: 1px solid var(--border); flex: none; }
  .status { font-size: 12px; color: var(--muted-fg); display: flex; align-items: center; gap: 7px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted-fg); flex: none; }
  .dot.scanning { background: var(--primary); animation: pulse 1s ease-in-out infinite; }
  .dot.ok { background: var(--ok); }
  @keyframes pulse { 0%,100% { opacity: .35 } 50% { opacity: 1 } }

  .btn { appearance: none; cursor: pointer; font: inherit; font-size: 12px; font-weight: 600;
    letter-spacing: .04em; text-transform: uppercase; white-space: nowrap; color: var(--fg);
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 7px 14px; box-shadow: var(--shadow-2xs); transition: background .14s, border-color .14s; }
  .btn:hover { background: var(--accent); border-color: color-mix(in oklch, var(--border) 55%, var(--primary)); }
  .btn:disabled { opacity: .5; cursor: progress; }
  .btn.primary { color: var(--primary-fg); background: var(--primary); border-color: var(--primary); }
  .btn.primary:hover { background: color-mix(in oklch, var(--primary) 88%, black); }

  .list { flex: 1; overflow: auto; padding: 7px; }
  .list .none { text-align: center; color: var(--muted-fg); font-size: 12px; line-height: 1.6; padding: 32px 18px; }

  .dog { position: relative; border-radius: var(--radius); margin: 3px 2px; padding: 9px 10px;
    transition: background .14s; }
  .dog:hover { background: var(--accent); }
  .dog .row { display: flex; align-items: center; gap: 11px; }
  .av { width: 26px; height: 26px; border-radius: 50%; flex: none;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.18), 0 1px 3px -1px rgba(0,0,0,.5); }
  .meta { flex: 1; min-width: 0; }
  .nm { font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sub { font-size: 11px; color: var(--muted-fg); font-family: var(--mono); margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-height: 13px; }
  .sub .serial { opacity: 0; transition: opacity .14s; }
  .dog:hover .sub .serial { opacity: .8; }
  .kebab { appearance: none; cursor: pointer; font: inherit; font-size: 16px; line-height: 1; color: var(--muted-fg);
    background: transparent; border: 0; border-radius: var(--radius); width: 24px; height: 24px; flex: none;
    opacity: 0; transition: opacity .14s, color .14s; }
  .dog:hover .kebab, .dog.active .kebab { opacity: 1; }
  .kebab:hover { color: var(--fg); }

  /* ⋯ dropdown */
  .menu { position: absolute; right: 8px; top: 38px; z-index: 5; min-width: 152px;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: 0 12px 30px -12px rgba(0,0,0,.55); padding: 4px; display: none; }
  .dog.menu-open .menu { display: block; }
  .menu button { display: block; width: 100%; text-align: left; appearance: none; cursor: pointer;
    font: inherit; font-size: 12.5px; color: var(--fg); background: transparent; border: 0;
    border-radius: calc(var(--radius) - 2px); padding: 7px 9px; }
  .menu button:hover { background: var(--accent); }

  /* rename input (replaces the name in place) */
  .rename { width: 100%; box-sizing: border-box; appearance: none; font: inherit; font-size: 13.5px;
    font-weight: 600; color: var(--fg); background: var(--bg); border: 1px solid var(--ring);
    border-radius: var(--radius); padding: 3px 7px; }
  .rename:focus { outline: none; box-shadow: 0 0 0 3px var(--ring-soft); }

  /* connect form */
  .form { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); display: none; }
  .dog.form-open .form { display: block; }
  .form label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted-fg); margin: 0 0 4px; }
  .form .fld { margin-bottom: 9px; }
  .form input { width: 100%; box-sizing: border-box; appearance: none; font: inherit; font-size: 13px;
    color: var(--fg); background: var(--bg); border: 1px solid var(--input); border-radius: var(--radius); padding: 7px 9px; }
  .form input:focus { outline: none; border-color: var(--ring); box-shadow: 0 0 0 3px var(--ring-soft); }
  .form .two { display: flex; gap: 8px; }
  .form .two .fld { flex: 1; }
  .form .actions { display: flex; gap: 8px; align-items: center; }
  .log { margin-top: 9px; font-family: var(--mono); font-size: 11px; line-height: 1.5; color: var(--muted-fg);
    max-height: 130px; overflow: auto; white-space: pre-wrap; }
  .log .ok { color: color-mix(in oklch, var(--ok) 80%, var(--fg)); }
  .log .err { color: color-mix(in oklch, var(--danger) 80%, var(--fg)); }

  /* reopen tab (left edge, visible when panel is slid away) */
  .reopen { position: fixed; top: 50%; left: 0; transform: translateY(-50%);
    writing-mode: vertical-rl; rotate: 180deg; cursor: pointer; padding: 14px 7px; font-size: 11px;
    font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--primary-fg);
    background: var(--primary); border-radius: 0 var(--radius) var(--radius) 0;
    box-shadow: 4px 0 14px -8px rgba(0,0,0,.5); display: none; }
  .reopen.show { display: block; }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="empty">
      <div class="glyph" id="stage-glyph">🐾</div>
      <h1 id="stage-title">No dog connected yet</h1>
      <p id="stage-msg">Scan for nearby Go2s, then send wifi credentials to bring one onto your network. Battery, camera, blueprints &amp; controls will live here.</p>
    </div>
  </div>

  <div class="panel" id="panel">
    <div class="p-head">
      <span class="t">Go2 Setup</span>
      <span class="spacer"></span>
      <button class="icon-btn" id="slide" title="Slide panel away">‹</button>
    </div>
    <div class="p-scan">
      <button class="btn primary" id="scan">Scan</button>
      <span class="status"><span class="dot" id="dot"></span><span id="status">Ready</span></span>
    </div>
    <div class="list" id="list">
      <div class="none">No Go2s found yet.<br />Power on a Go2 nearby and press <b>Scan</b>.</div>
    </div>
  </div>

  <div class="reopen" id="reopen">Go2 Setup</div>

<script type="module">
import { DimAppFrontend } from "https://esm.sh/gh/jeff-hykin/dim-app@v0.1.0/frontend.js"

// follow the shell's light/dark like the other apps
;(function () { const m = matchMedia("(prefers-color-scheme: light)"); const a = () => document.body.classList.toggle("dark", !m.matches); a(); m.addEventListener("change", a) })()

const dimApp = new DimAppFrontend()

const els = {
  list: document.getElementById("list"),
  dot: document.getElementById("dot"),
  status: document.getElementById("status"),
  scan: document.getElementById("scan"),
  panel: document.getElementById("panel"),
  reopen: document.getElementById("reopen"),
  slide: document.getElementById("slide"),
  stage: document.getElementById("stage"),
  stageGlyph: document.getElementById("stage-glyph"),
  stageTitle: document.getElementById("stage-title"),
  stageMsg: document.getElementById("stage-msg"),
}

let devices = []       // [{serial,name,ble_mac,ip,lan_mac,customName}]
let scanning = false
let hasPython = true
let menuKey = null     // ⋯ menu open for this dog
let formKey = null     // connect form open for this dog
let editKey = null     // rename input open for this dog

function keyOf(d) { return d.serial || d.ble_mac || "" }
function btId(d) { return d.ble_mac || d.serial || "" }
function nameOf(d) {
  return d.customName || d.name || (d.serial ? "Go2 " + d.serial.slice(-5) : (d.ble_mac || "Unknown Go2"))
}

// Deterministic pleasant colour from the Bluetooth id.
function colorFor(id) {
  let h = 0
  for (const c of String(id)) h = (h * 31 + c.charCodeAt(0)) >>> 0
  return `hsl(${h % 360} 62% 55%)`
}

function setStatus(text, cls) {
  els.status.textContent = text
  els.dot.className = "dot" + (cls ? " " + cls : "")
}

function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])) }
function cssEsc(s) { return String(s).replace(/["\\]/g, "\\$&") }

function dogHtml(d) {
  const key = keyOf(d)
  const canConnect = !!d.ble_mac
  const classes = ["dog"]
  if (menuKey === key) classes.push("menu-open", "active")
  if (formKey === key) classes.push("form-open", "active")
  const nameCell = (editKey === key)
    ? `<input class="rename" value="${esc(nameOf(d))}" />`
    : `<div class="nm">${esc(nameOf(d))}</div>`
  // sub-line: IP always shown if present; serial revealed on hover
  const ip = d.ip ? `<span class="ip">${esc(d.ip)}</span>` : ""
  const serial = d.serial ? `<span class="serial">${d.ip ? " · " : ""}${esc(d.serial)}</span>` : ""
  return `<div class="${classes.join(" ")}" data-key="${esc(key)}">
    <div class="row">
      <span class="av" style="background:${colorFor(btId(d))}"></span>
      <div class="meta">${nameCell}<div class="sub">${ip}${serial}${(!ip && !serial) ? "—" : ""}</div></div>
      <button class="kebab" title="More">⋯</button>
    </div>
    <div class="menu">
      <button class="mi-connect"${canConnect ? "" : " disabled style=\"opacity:.45;cursor:default\""}>Connect to Wi-Fi…</button>
      <button class="mi-rename">Rename</button>
    </div>
    <div class="form">
      ${canConnect ? "" : '<div class="log err">LAN-only sighting — no Bluetooth address to provision wifi over.</div>'}
      <div class="fld"><label>Wifi SSID</label><input class="f-ssid" placeholder="network name" ${canConnect ? "" : "disabled"} /></div>
      <div class="two">
        <div class="fld"><label>Password</label><input class="f-pass" type="password" placeholder="••••••" ${canConnect ? "" : "disabled"} /></div>
        <div class="fld" style="flex:0 0 76px"><label>Country</label><input class="f-country" value="US" maxlength="2" ${canConnect ? "" : "disabled"} /></div>
      </div>
      <div class="actions"><button class="btn primary f-go" ${canConnect ? "" : "disabled"}>Connect</button></div>
      <div class="log f-log"></div>
    </div>
  </div>`
}

function render() {
  if (!hasPython) {
    els.list.innerHTML = '<div class="none">The dimos venv isn\'t available, so BLE discovery can\'t run.<br />Open this from a dashboard with dimos installed.</div>'
    return
  }
  if (!devices.length) {
    els.list.innerHTML = scanning
      ? '<div class="none">Scanning for nearby Go2s…</div>'
      : '<div class="none">No Go2s found yet.<br />Power on a Go2 nearby and press <b>Scan</b>.</div>'
    return
  }
  els.list.innerHTML = devices.map(dogHtml).join("")
  if (editKey) {
    const inp = els.list.querySelector(`.dog[data-key="${cssEsc(editKey)}"] .rename`)
    if (inp) { inp.focus(); inp.select() }
  }
}

// ── events from the backend (tag "go2") ──
dimApp.receiveRequest((tag, msg) => {
  if (tag !== "go2") return
  switch (msg.type) {
    case "snapshot":
      hasPython = msg.hasPython
      devices = msg.devices || []
      render(); break
    case "scan_start":
      scanning = true; setStatus("Scanning…", "scanning"); els.scan.disabled = true; render(); break
    case "scan_done":
      scanning = false; els.scan.disabled = false
      setStatus(msg.count ? `${msg.count} found` : "None found", msg.count ? "ok" : null)
      render(); break
    case "device": {
      const key = keyOf(msg)
      const i = devices.findIndex(d => keyOf(d) === key)
      if (i >= 0) devices[i] = { ...devices[i], ...msg }; else devices.push(msg)
      render(); break
    }
    case "renamed": {
      const d = devices.find(x => keyOf(x) === msg.key)
      if (d) { d.customName = msg.customName || undefined; render() }
      break
    }
    case "progress": appendLog(msg.msg); break
    case "connect_result":
      if (msg.ok) { appendLog("✓ Connected" + (msg.serial ? " — serial " + msg.serial : ""), "ok"); onConnected() }
      else { appendLog("✗ " + (msg.error || "failed"), "err"); setBusy(false) }
      break
    case "warn": break // non-fatal (e.g. a LAN interface w/o route)
  }
})

function appendLog(line, cls) {
  if (!formKey) return
  const log = els.list.querySelector(`.dog[data-key="${cssEsc(formKey)}"] .f-log`)
  if (!log) return
  const div = document.createElement("div")
  if (cls) div.className = cls
  div.textContent = line
  log.appendChild(div)
  log.scrollTop = log.scrollHeight
}

function setBusy(on) {
  if (!formKey) return
  const btn = els.list.querySelector(`.dog[data-key="${cssEsc(formKey)}"] .f-go`)
  if (btn) { btn.disabled = on; btn.textContent = on ? "Connecting…" : "Connect" }
}

function onConnected() {
  setBusy(false)
  const d = devices.find(x => keyOf(x) === formKey)
  els.stage.classList.add("connected")
  els.stageGlyph.textContent = "🐕"
  els.stageTitle.textContent = d ? nameOf(d) + " connected" : "Go2 connected"
  els.stageMsg.textContent = "Wifi credentials sent. Once it joins the network its dashboard — battery, camera, blueprints & controls — will appear here."
  setTimeout(() => setSlid(true), 900)
}

// ── interactions (event delegation) ──
els.list.addEventListener("click", (e) => {
  const dog = e.target.closest(".dog")
  if (!dog) return
  const key = dog.dataset.key

  if (e.target.closest(".kebab")) { menuKey = (menuKey === key) ? null : key; render(); return }
  if (e.target.closest(".mi-connect")) {
    if (e.target.disabled) return
    formKey = key; menuKey = null; render(); return
  }
  if (e.target.closest(".mi-rename")) { editKey = key; menuKey = null; render(); return }
  if (e.target.closest(".f-go")) { e.stopPropagation(); startConnect(key); return }
})

// rename: commit on Enter / blur, cancel on Escape
els.list.addEventListener("keydown", (e) => {
  if (!e.target.classList.contains("rename")) return
  if (e.key === "Enter") { e.target.blur() }
  else if (e.key === "Escape") { editKey = null; render() }
})
els.list.addEventListener("blur", (e) => {
  if (!e.target.classList.contains("rename")) return
  const key = e.target.closest(".dog")?.dataset.key
  if (key) {
    const name = e.target.value.trim()
    dimApp.send("rename", { key, name })
    const d = devices.find(x => keyOf(x) === key)
    if (d) d.customName = name || undefined
  }
  editKey = null
  render()
}, true)

// click outside any dog closes an open ⋯ menu
document.addEventListener("click", (e) => {
  if (menuKey && !e.target.closest(".dog")) { menuKey = null; render() }
})

function startConnect(key) {
  const d = devices.find(x => keyOf(x) === key)
  if (!d || !d.ble_mac) return
  const root = els.list.querySelector(`.dog[data-key="${cssEsc(key)}"]`)
  const ssid = root.querySelector(".f-ssid").value.trim()
  const password = root.querySelector(".f-pass").value
  const country = (root.querySelector(".f-country").value.trim() || "US").toUpperCase()
  if (!ssid) { appendLog("Enter a wifi SSID first.", "err"); return }
  root.querySelector(".f-log").innerHTML = ""
  setBusy(true)
  dimApp.send("connect", { mac: d.ble_mac, ssid, password, country })
}

els.scan.addEventListener("click", () => {
  devices = []; menuKey = formKey = editKey = null
  dimApp.send("scan", { timeout: 7 })
})

function setSlid(slid) {
  els.panel.classList.toggle("slid", slid)
  els.reopen.classList.toggle("show", slid)
}
els.slide.addEventListener("click", () => setSlid(true))
els.reopen.addEventListener("click", () => setSlid(false))

dimApp.send("hello")
render()
</script>
</body>
</html>
